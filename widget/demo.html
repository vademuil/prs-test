<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRS Widget — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background: #F8F8FC; margin: 0; padding: 40px 20px; }
    .host { max-width: 1280px; margin: 0 auto; }
    .host > h1 { color: #444; font-weight: 600; margin: 0 0 8px; }
    .host > p { color: #888; margin: 0 0 32px; }
    #prs-widget { background: #FFFFFF; padding: 32px; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
  </style>
</head>
<body>
  <div class="host">
    <h1>Host page (demo)</h1>
    <p>The PRS widget is rendered natively inside this page — no iframe.</p>

    <div id="prs-widget"></div>
  </div>

  <script src="prs-widget.js"></script>
  <script>
    PRSWidget.mount('prs-widget', {
      streamlitUrl: 'https://prs-publishers.streamlit.app',
      defaultUsd: 29.99,
      primaryColor: '#4600FF',
    });
  </script>
</body>
</html>
