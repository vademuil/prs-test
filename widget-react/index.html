<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRS Widget — Dev</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #F8F8FC; margin: 0; padding: 40px 20px; font-family: 'Space Grotesk', sans-serif; }
    .host { max-width: 1280px; margin: 0 auto; }
    h1 { color: #444; font-weight: 600; margin: 0 0 8px; }
    p { color: #888; margin: 0 0 32px; }
    #prs-widget { background: #FFFFFF; padding: 32px; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
  </style>
</head>
<body>
  <div class="host">
    <h1>Host page (dev)</h1>
    <p>The React widget is mounted natively inside this page — Vite HMR is active during <code>npm run dev</code>.</p>
    <div id="prs-widget"></div>
  </div>

  <script type="module" src="/src/main.tsx"></script>
  <script type="module">
    // After main.tsx loads, mount the widget.
    queueMicrotask(() => {
      window.PRSWidget?.mount('prs-widget', {
        // apiUrl: 'http://localhost:5000',          // uncomment if you have the backend running
        streamlitUrl: 'https://prs-publishers.streamlit.app',
        defaultUsd: 29.99,
        primaryColor: '#4600FF',
      });
    });
  </script>
</body>
</html>
